<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backtest — SportsDecrypté</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&display=swap');
  :root {
    --bg: #05050d;
    --bg2: #0a0a16;
    --bg3: #111120;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --txt: #f0f0ff;
    --txt2: rgba(240,240,255,0.55);
    --txt3: rgba(240,240,255,0.25);
    --gold: #f5c842;
    --green: #00e5b8;
    --red: #ff4757;
    --orange: #ff6b35;
    --blue: #5b9bff;
    --purple: #b06ef3;
    --win: rgba(0,229,184,0.08);
    --win-border: rgba(0,229,184,0.2);
    --loss: rgba(255,71,87,0.06);
    --loss-border: rgba(255,71,87,0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: var(--bg);
    color: var(--txt);
    font-family: 'Syne', -apple-system, sans-serif;
    font-size: 14px;
    min-height: 100vh;
    line-height: 1.5;
  }
  body::before {
    content: '';
    position: fixed; top: -150px; right: -150px;
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(176,110,243,0.06) 0%, transparent 65%);
    pointer-events: none; z-index: 0;
  }
  .container { max-width: 430px; margin: 0 auto; padding: 0 0 80px; position: relative; z-index: 1; }

  /* HEADER */
  .header {
    display: flex; align-items: center; gap: 14px;
    padding: 52px 20px 18px;
    border-bottom: 1px solid var(--border);
    background: rgba(5,5,13,0.92);

    -webkit-backdrop-filter: blur(28px);
    position: sticky; top: 0; z-index: 50;
  }
  .header-back {
    width: 38px; height: 38px;
    background: rgba(255,255,255,0.05); border: 1px solid var(--border2);
    border-radius: 12px; display: flex; align-items: center;
    justify-content: center; cursor: pointer; font-size: 18px;
    text-decoration: none; color: var(--txt); flex-shrink: 0;
    transition: all 0.15s;
  }
  .header-back:active { transform: scale(0.93); }
  .header-icon {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--purple), #7c3aed);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
    box-shadow: 0 4px 16px rgba(176,110,243,0.3);
  }
  .header-title { font-family: 'Bebas Neue', cursive; font-size: 24px; letter-spacing: 3px; color: var(--txt); }
  .header-sub { font-size: 10px; color: var(--txt3); letter-spacing: 2px; font-weight: 700; }

  /* CONTROLS */
  .controls {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
  }
  .controls-title {
    font-size: 9px; letter-spacing: 3px; color: var(--txt3);
    font-weight: 700; margin-bottom: 12px; text-transform: uppercase;
  }
  .controls-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
  .ctrl-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 110px; }
  .ctrl-label { font-size: 9px; letter-spacing: 1.5px; color: var(--txt3); font-weight: 700; text-transform: uppercase; }
  input[type="date"], select {
    background: rgba(255,255,255,0.05); border: 1px solid var(--border2);
    color: var(--txt); padding: 10px 12px; border-radius: 12px;
    font-size: 13px; font-family: 'Syne', inherit; outline: none;
    transition: border-color 0.15s, box-shadow 0.15s; color-scheme: dark;
    -webkit-appearance: none; appearance: none;
    background-color: #111120 !important;
    -webkit-text-fill-color: var(--txt) !important;
  }
  input[type="date"]:focus, select:focus {
    border-color: rgba(176,110,243,0.5);
    box-shadow: 0 0 0 3px rgba(176,110,243,0.1);
  }
  /* Forcer fond sombre global iOS */
  html, body, .container, .controls, .header {
    background-color: var(--bg) !important;
    -webkit-text-fill-color: var(--txt);
  }

  /* PERIOD CHIPS */
  .period-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .period-chip {
    padding: 6px 13px; border-radius: 20px;
    background: var(--bg3); border: 1px solid var(--border);
    font-size: 11px; color: var(--txt2); cursor: pointer;
    transition: all 0.15s; user-select: none; font-weight: 700;
  }
  .period-chip:active { transform: scale(0.96); }
  .period-chip.active {
    background: rgba(176,110,243,0.12);
    border-color: rgba(176,110,243,0.4); color: var(--purple);
  }

  /* RUN BUTTON */
  .btn-run {
    background: linear-gradient(135deg, var(--purple), #7c3aed);
    color: #fff; border: none; border-radius: 14px;
    padding: 13px 20px; font-family: 'Bebas Neue', cursive;
    font-size: 16px; letter-spacing: 2px; cursor: pointer;
    box-shadow: 0 6px 20px rgba(176,110,243,0.3);
    transition: all 0.15s; white-space: nowrap;
  }
  .btn-run:active { transform: scale(0.96); opacity: 0.9; }
  .btn-run:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* SUMMARY CARDS */
  .summary {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 10px; padding: 16px 20px 0;
  }
  .sum-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 18px; padding: 14px;
    position: relative; overflow: hidden;
  }
  .sum-card::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(145deg, rgba(255,255,255,0.02), transparent);
    pointer-events: none;
  }
  .sum-label { font-size: 9px; letter-spacing: 2px; color: var(--txt3); font-weight: 700; margin-bottom: 6px; }
  .sum-value { font-family: 'Bebas Neue', cursive; font-size: 32px; line-height: 1; }
  .sum-sub { font-size: 10px; color: var(--txt2); margin-top: 4px; }
  .pos { color: var(--green); } .neg { color: var(--red); } .neu { color: var(--txt); }

  /* MATCH ROWS */
  .matches-section { padding: 16px 20px 0; }
  .section-title {
    font-size: 9px; letter-spacing: 3px; color: var(--txt3); font-weight: 700;
    margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .match-row {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 12px 14px; margin-bottom: 8px;
    transition: all 0.15s; position: relative; overflow: hidden;
  }
  .match-row.win { border-color: var(--win-border); background: var(--win); }
  .match-row.loss { border-color: var(--loss-border); background: var(--loss); }
  .match-row.pending { border-color: rgba(245,200,66,0.2); background: rgba(245,200,66,0.04); }
  .match-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .match-teams { font-weight: 700; font-size: 13px; }
  .match-result-badge {

  .match-result-badge.pending { background: rgba(245,200,66,0.15); color: var(--gold); }
  .match-bottom { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  /* STATUS */
  .status {
    padding: 12px 20px;
    background: var(--bg2); border-bottom: 1px solid var(--border);
    font-size: 12px; color: var(--txt2); display: flex; align-items: center; gap: 10px;
  }
  .status-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .status-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--blue)); transition: width 0.3s; }

  /* EMPTY */
  .empty { text-align: center; padding: 60px 24px; color: var(--txt3); }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-title { font-family: 'Bebas Neue', cursive; font-size: 22px; letter-spacing: 3px; margin-bottom: 8px; }
  .empty-sub { font-size: 12px; line-height: 1.7; }

  .spin { width: 20px; height: 20px; border: 2px solid var(--border2); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 0; }
/* BUTTONS */

  border-radius: 10px; font-weight: 700; font-size: 13px;

}

.summary-label { font-size: 10px; color: var(--txt2); letter-spacing: 1px; text-transform: uppercase; }

/* MARKET BREAKDOWN */
.market-grid {

}

}
.market-name {

.market-stats {

}

.bet-name { flex: 1; color: var(--txt2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ROI CHART */
.roi-chart {

}

/* EMPTY / LOADER */
.empty, .loader {

.spin {

/* DISCLAIMER */
.disclaimer {

/* FILTER ROW */
.filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.filter-chip {

@media (max-width: 600px) {

  .controls-row { flex-direction: column; }

<div class="container">

  <div class="header">

    ⚠️ <strong style="color:var(--gold);-webkit-text-fill-color:var(--gold)">Cotes estimées par notre modèle</strong> — pas des cotes bookmaker réelles.

        <div class="period-chip" data-days="30" onclick="selectPeriod(this,30)">30j</div>

      <div class="ctrl-group">
        <label class="ctrl-label" for="dateFrom">Du</label>
        <input type="date" id="dateFrom">

        <label class="ctrl-label" for="dateTo">Au</label>
        <input type="date" id="dateTo">

<script>
'use strict';

var API_BASE = '/api/football-data';
var TOP5_PLUS_CL = ['PL','PD','BL1','SA','FL1','CL'];

var CACHE_PREFIX = 'sd_bt_';
var CACHE_TTL = 24 * 60 * 60 * 1000;

var state = {
  lastCall: 0,
  callsThisMin: []
};

/* ── Cache ── */
function cGet(key) {
  try {
    var r = localStorage.getItem(CACHE_PREFIX + key);
    if (!r) return null;
    var e = JSON.parse(r);
    if (Date.now() - e.t > CACHE_TTL) { localStorage.removeItem(CACHE_PREFIX + key); return null; }
    return e.d;
  } catch(e) { return null; }
}
function cSet(key, data) {
  try { localStorage.setItem(CACHE_PREFIX + key, JSON.stringify({ t: Date.now(), d: data })); }
  catch(e) {}
}

/* ── Rate limit ── */
function rateWait() {
  var now = Date.now();
  state.callsThisMin = state.callsThisMin.filter(function(t) { return now - t < 60000; });
  if (state.callsThisMin.length >= 9) {
    var oldest = state.callsThisMin[0];
    return new Promise(function(resolve) { setTimeout(resolve, 60000 - (now - oldest) + 500); });
  }
  var since = now - state.lastCall;
  if (since < 6500) {
    return new Promise(function(resolve) { setTimeout(resolve, 6500 - since); });
  }
  return Promise.resolve();
}

/* ── API ── */
function apiCall(endpoint, cacheKey) {
  if (cacheKey) {
    var c = cGet(cacheKey);
    if (c) return Promise.resolve(c);
  }
  return rateWait().then(function() {
    state.lastCall = Date.now();
    state.callsThisMin.push(Date.now());
    return fetch(API_BASE + '?path=' + encodeURIComponent(endpoint));
  }).then(function(res) {
    if (!res.ok) throw new Error('API ' + res.status);
    return res.json();
  }).then(function(data) {
    if (cacheKey) cSet(cacheKey, data);
    return data;
  });
}

/* ── Période ── */
function selectPeriod(el, days) {
  document.querySelectorAll('.period-chip').forEach(function(c) { c.classList.remove('active'); });
  el.classList.add('active');
  var df = document.getElementById('dateFrom');
  var dt = document.getElementById('dateTo');
  var today = new Date();
  dt.value = today.toISOString().slice(0,10);
  if (days > 0) {
    var from = new Date(today.getTime() - (days-1) * 86400000);
    df.value = from.toISOString().slice(0,10);
  }
}

/* ── Init dates ── */
function initDates() {
  var today = new Date();
  var from = new Date(today.getTime() - 6 * 86400000);
  document.getElementById('dateTo').value = today.toISOString().slice(0,10);
  document.getElementById('dateFrom').value = from.toISOString().slice(0,10);
}

/* ── Modèle Poisson ── */
function poissonP(lambda, k) {
  var r = Math.exp(-lambda);
  for (var i = 1; i <= k; i++) r *= lambda / i;
  return r;
}

var DC_RHO = -0.13;
function dcCorrection(i, j, lH, lA) {
  if (i===0 && j===0) return 1 - lH * lA * DC_RHO;
  if (i===1 && j===0) return 1 + lA * DC_RHO;
  if (i===0 && j===1) return 1 + lH * DC_RHO;
  if (i===1 && j===1) return 1 - DC_RHO;
  return 1;
}

function computeBets(home, away) {
  if (!home || !away) return [];
  var avg = 1.35, homeAdv = 1.15;
  var lH = Math.max(0.3, Math.min(5, home.avgGF * away.avgGA / avg * homeAdv));
  var lA = Math.max(0.3, Math.min(5, away.avgGF * home.avgGA / avg));

  var win=0, draw=0, lose=0, btts=0, over=0, over15=0;
  var max=8;
  for (var i=0;i<=max;i++) {
    for (var j=0;j<=max;j++) {
      var p = poissonP(lH,i) * poissonP(lA,j) * dcCorrection(i,j,lH,lA);
      if (i>j) win+=p; else if (i===j) draw+=p; else lose+=p;
      if (i>0&&j>0) btts+=p;
      if (i+j>2) over+=p;
      if (i+j>1) over15+=p;
    }
  }
  var total = win+draw+lose;
  if (total>0) { win/=total; draw/=total; lose/=total; }

  var bets = [];
  bets.push({ market:'1N2', name:'Victoire Domicile', prob:win, score:Math.round(win*100), fairOdds:(1/win*0.95).toFixed(2) });
  bets.push({ market:'1N2', name:'Match Nul', prob:draw, score:Math.round(draw*100), fairOdds:(1/draw*0.95).toFixed(2) });
  bets.push({ market:'1N2', name:'Victoire Extérieur', prob:lose, score:Math.round(lose*100), fairOdds:(1/lose*0.95).toFixed(2) });
  bets.push({ market:'DC', name:'DC 1X', prob:win+draw, score:Math.round((win+draw)*100), fairOdds:(1/((win+draw))*0.95).toFixed(2) });
  bets.push({ market:'DC', name:'DC X2', prob:away+draw, score:Math.round((lose+draw)*100), fairOdds:(1/((lose+draw))*0.95).toFixed(2) });
  bets.push({ market:'OU', name:'Over 2.5', prob:over, score:Math.round(over*100), fairOdds:(1/over*0.95).toFixed(2) });
  bets.push({ market:'OU', name:'Under 2.5', prob:1-over, score:Math.round((1-over)*100), fairOdds:(1/(1-over)*0.95).toFixed(2) });
  bets.push({ market:'BTTS', name:'BTTS Oui', prob:btts, score:Math.round(btts*100), fairOdds:(1/btts*0.95).toFixed(2) });
  bets.push({ market:'BTTS', name:'BTTS Non', prob:1-btts, score:Math.round((1-btts)*100), fairOdds:(1/(1-btts)*0.95).toFixed(2) });
  bets.sort(function(a,b){ return b.score-a.score; });
  return bets;
}

function summarizeMatches(matches, teamId) {
  if (!matches || !matches.length) return null;
  var gf=0, ga=0, n=0;
  matches.forEach(function(m) {
    if (m.status !== 'FINISHED') return;
    var ft = m.score && m.score.fullTime;
    if (!ft || ft.home==null || ft.away==null) return;
    var isHome = m.homeTeam && m.homeTeam.id === teamId;
    gf += isHome ? ft.home : ft.away;
    ga += isHome ? ft.away : ft.home;
    n++;
  });
  if (!n) return null;
  return { avgGF: gf/n, avgGA: ga/n, played: n };
}

function lastN(matches, n) {
  return matches.slice().sort(function(a,b) {
    return new Date(b.utcDate) - new Date(a.utcDate);
  }).slice(0, n);
}

/* ── Vérification du résultat réel ── */
function checkBet(bet, match) {
  var ft = match.score && match.score.fullTime;
  if (!ft || ft.home==null || ft.away==null) return null;
  var hg = ft.home, ag = ft.away;
  var total = hg + ag;

  if (bet.market === '1N2') {
    if (bet.name === 'Victoire Domicile') return hg > ag;
    if (bet.name === 'Match Nul') return hg === ag;
    if (bet.name === 'Victoire Extérieur') return ag > hg;
  }
  if (bet.market === 'DC') {
    if (bet.name === 'DC 1X') return hg >= ag;
    if (bet.name === 'DC X2') return ag >= hg;
  }
  if (bet.market === 'OU') {
    if (bet.name === 'Over 2.5') return total > 2.5;
    if (bet.name === 'Under 2.5') return total <= 2.5;
    if (bet.name === 'Over 1.5') return total > 1.5;
    if (bet.name === 'Under 1.5') return total <= 1.5;
  }
  if (bet.market === 'BTTS') {
    if (bet.name === 'BTTS Oui') return hg > 0 && ag > 0;
    if (bet.name === 'BTTS Non') return hg === 0 || ag === 0;
  }
  return null;
}

/* ── BACKTEST PRINCIPAL ── */
function runBacktest() {
  var dateFrom = document.getElementById("dateFrom").value;
  var dateTo = document.getElementById("dateTo").value;
  var league = document.getElementById("leagueSelect").value;
  var marketF = document.getElementById("marketFilter").value;

  if (!dateFrom || !dateTo) { showToast("Selectionne une periode"); return; }
  if (new Date(dateFrom) > new Date(dateTo)) { showToast("La date de debut doit etre avant la date de fin"); return; }

  var btn = document.getElementById("runBtn");
  btn.disabled = true;
  btn.textContent = "ANALYSE...";

  var statusBar = document.getElementById("statusBar");
  var statusText = document.getElementById("statusText");
  var statusFill = document.getElementById("statusFill");
  statusBar.style.display = "flex";
  statusFill.style.width = "0%";

  document.getElementById("results").innerHTML = "";

  var compCodes = league === "ALL_TOP" ? TOP5_PLUS_CL : [league];
  var allMatches = [];
  var fetchChain = Promise.resolve();
  var idx = 0;

  compCodes.forEach(function(code) {
    fetchChain = fetchChain.then(function() {
      idx++;
      statusText.textContent = "Recuperation " + code + " (" + idx + "/" + compCodes.length + ")...";
      statusFill.style.width = Math.round(idx / compCodes.length * 40) + "%";
      return apiCall("/competitions/" + code + "/matches?dateFrom=" + dateFrom + "&dateTo=" + dateTo,
        "bt_matches_" + code + "_" + dateFrom + "_" + dateTo)
        .then(function(data) {
          var finished = (data.matches || []).filter(function(m) { return m.status === "FINISHED"; });
          allMatches = allMatches.concat(finished);
        })
        .catch(function(e) { console.warn(code, e.message); });
    });
  });

  fetchChain.then(function() {
    var results = document.getElementById('results');
    var statusBar = document.getElementById('statusBar');
    var statusText = document.getElementById('statusText');
    var statusFill = document.getElementById('statusFill');

    if (!allMatches.length) {
      results.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">Aucun match trouvé</div><div class="empty-sub">Aucun match terminé sur cette période et cette compétition.</div></div>';
      btn.disabled = false; btn.textContent = '⚡ LANCER LE BACKTEST';
      statusBar.style.display = 'none';
      return;
    }

    var MAX = Math.min(allMatches.length, 15);
    var slice = allMatches.slice(0, MAX);
    if (allMatches.length > MAX) {
      showToast('⚠️ ' + allMatches.length + ' matchs, ' + MAX + ' analysés (limite API)');
    }

    statusText.textContent = '0/' + slice.length + ' matchs analysés...';
    statusFill.style.width = '40%';

    var analyzed = [];
    var chain2 = Promise.resolve();
    var done = 0;

    slice.forEach(function(match) {
      chain2 = chain2.then(function() {
        done++;
        statusText.textContent = done + '/' + slice.length + ' — ' + esc((match.homeTeam.shortName||match.homeTeam.name)) + ' vs ' + esc((match.awayTeam.shortName||match.awayTeam.name));
        statusFill.style.width = Math.round(40 + done / slice.length * 55) + '%';

        var homeId = match.homeTeam.id;
        var awayId = match.awayTeam.id;

        return apiCall('/teams/' + homeId + '/matches?status=FINISHED&limit=10', 'bt_team_' + homeId)
          .catch(function() { return null; })
          .then(function(hd) {
            return apiCall('/teams/' + awayId + '/matches?status=FINISHED&limit=10', 'bt_team_' + awayId)
              .catch(function() { return null; })
              .then(function(ad) {
                var hm = (hd && hd.matches) || [];
                var am = (ad && ad.matches) || [];
                var hStats = summarizeMatches(lastN(hm, 8), homeId);
                var aStats = summarizeMatches(lastN(am, 8), awayId);
                var bets = computeBets(hStats, aStats);

                var filteredBets = marketF === 'all' ? bets
                  : bets.filter(function(b) { return b.market === marketF; });

                var enriched = filteredBets.map(function(b) {
                  var won = checkBet(b, match);
                  return Object.assign({}, b, { won: won });
                });

                analyzed.push({
                  match: match,
                  bets: enriched,
                  topBet: enriched[0] || null
                });
              });
          });
      });
    });

    chain2.then(function() {
      statusFill.style.width = '100%';
      setTimeout(function() { statusBar.style.display = 'none'; }, 500);
      renderResults(analyzed, marketF);
      btn.disabled = false; btn.textContent = '⚡ LANCER LE BACKTEST';
    }).catch(function(err) {
      results.innerHTML = '<div class="empty"><div class="empty-icon">❌</div><div class="empty-title">Erreur</div><div class="empty-sub">' + esc(err.message) + '</div></div>';
      btn.disabled = false; btn.textContent = '⚡ LANCER LE BACKTEST';
      statusBar.style.display = 'none';
    });
  });
}

/* ── RENDU DES RÉSULTATS ── */
function renderResults(analyzed, marketF) {
  var results = document.getElementById('results');
  if (!analyzed.length) {
    results.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">Aucun résultat</div><div class="empty-sub">Aucun match à afficher pour cette période.</div></div>';
    return;
  }

  var totalPredictions = 0, correctPredictions = 0;
  var roi = 0;
  var byMarket = {};

  analyzed.forEach(function(a) {
    if (!a.topBet || a.topBet.won === null) return;
    totalPredictions++;
    var won = a.topBet.won;
    if (won) { correctPredictions++; roi += parseFloat(a.topBet.fairOdds) - 1; }
    else { roi -= 1; }
    var m = a.topBet.market;
    if (!byMarket[m]) byMarket[m] = { total: 0, correct: 0 };
    byMarket[m].total++;
    if (won) byMarket[m].correct++;
  });

  var accuracy = totalPredictions > 0 ? (correctPredictions / totalPredictions * 100) : 0;
  var roiPct = totalPredictions > 0 ? (roi / totalPredictions * 100) : 0;
  var accColor = accuracy >= 60 ? 'var(--green)' : accuracy >= 50 ? 'var(--gold)' : 'var(--red)';
  var roiColor = roiPct >= 0 ? 'var(--green)' : 'var(--red)';
  var avgScore = analyzed.reduce(function(s,a){ return s + (a.topBet?a.topBet.score:0); }, 0) / Math.max(1, analyzed.length);

  var html = '';

  // ── Résumé ──
  html += '<div class="summary">';
  html += '<div class="sum-card"><div class="sum-label">PRÉCISION</div><div class="sum-value ' + (accuracy>=60?'pos':accuracy>=50?'':'neg') + '">' + accuracy.toFixed(1) + '%</div><div class="sum-sub">' + correctPredictions + '/' + totalPredictions + ' top picks</div></div>';
  html += '<div class="sum-card"><div class="sum-label">ROI THÉORIQUE</div><div class="sum-value ' + (roiPct>=0?'pos':'neg') + '">' + (roiPct>=0?'+':'') + roiPct.toFixed(1) + '%</div><div class="sum-sub">1 unité/top pick</div></div>';
  html += '<div class="sum-card"><div class="sum-label">MATCHS</div><div class="sum-value neu">' + analyzed.length + '</div><div class="sum-sub">analysés</div></div>';
  html += '<div class="sum-card"><div class="sum-label">SCORE MOY.</div><div class="sum-value" style="color:var(--gold)">' + avgScore.toFixed(0) + '</div><div class="sum-sub">sur 100</div></div>';
  html += '</div>';

  // ── ROI Chart ──
  var roiCumulative = [];
  var cum = 0;
  analyzed.forEach(function(a) {
    if (!a.topBet || a.topBet.won === null) return;
    cum += a.topBet.won ? parseFloat(a.topBet.fairOdds) - 1 : -1;
    roiCumulative.push(cum);
  });

  if (roiCumulative.length > 1) {
    html += '<div class="matches-section">';
    html += '<div class="section-title">📈 ROI CUMULATIF</div>';
    html += '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:16px;overflow:hidden">';
    html += renderROIChart(roiCumulative);
    html += '</div></div>';
  }

  // ── Par marché ──
  var marketKeys = Object.keys(byMarket);
  if (marketKeys.length > 1) {
    html += '<div class="matches-section" style="margin-top:16px">';
    html += '<div class="section-title">🎯 PAR MARCHÉ</div>';
    html += '<div style="display:flex;flex-direction:column;gap:8px">';
    marketKeys.forEach(function(m) {
      var d = byMarket[m];
      var acc = d.total > 0 ? d.correct / d.total * 100 : 0;
      var col = acc >= 60 ? 'var(--green)' : acc >= 50 ? 'var(--gold)' : 'var(--red)';
      html += '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:12px 14px">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
      html += '<div style="font-size:12px;font-weight:700">' + esc(m) + '</div>';
      html += '<div style="font-family:\'Bebas Neue\',cursive;font-size:20px;color:' + col + '">' + acc.toFixed(0) + '%</div>';
      html += '</div>';
      html += '<div class="progress-bar"><div class="progress-fill" style="width:' + acc.toFixed(0) + '%;background:' + col + '"></div></div>';
      html += '<div style="font-size:10px;color:var(--txt3);margin-top:4px">' + d.correct + '/' + d.total + ' paris gagnés</div>';
      html += '</div>';
    });
    html += '</div></div>';
  }

  // ── Détail matchs ──
  html += '<div class="matches-section" style="margin-top:16px">';
  html += '<div class="section-title">📋 MATCH PAR MATCH</div>';

  analyzed.forEach(function(a) {
    var match = a.match;
    var ft = match.score && match.score.fullTime;
    var scoreStr = ft ? ft.home + ' - ' + ft.away : '?';
    var topWon = a.topBet && a.topBet.won;
    var rowClass = a.topBet && a.topBet.won !== null ? (topWon ? 'win' : 'loss') : 'pending';

    html += '<div class="match-row ' + rowClass + '">';
    html += '<div class="match-top">';
    html += '<div>';
    html += '<div class="match-teams">' + esc((match.homeTeam.shortName||match.homeTeam.name)) + ' vs ' + esc((match.awayTeam.shortName||match.awayTeam.name)) + '</div>';
    html += '<div style="font-size:10px;color:var(--txt3)">' + esc((match.competition&&match.competition.name)||'') + ' · ' + formatDate(match.utcDate) + '</div>';
    html += '</div>';
    if (a.topBet && a.topBet.won !== null) {
      var badge = topWon ? 'win' : 'loss';
      var label = topWon ? '✅ GAGNÉ' : '❌ PERDU';
      html += '<div class="match-result-badge ' + badge + '">' + label + '</div>';
    } else {
      html += '<div class="match-result-badge pending">⏳ N/A</div>';
    }
    html += '</div>';

    // Résultat réel
    html += '<div class="match-score" style="margin:6px 0;font-size:14px;color:var(--txt2)">' + scoreStr + '</div>';

    // Top bet
    if (a.topBet) {
      var b = a.topBet;
      var pnl = b.won === null ? '' : (b.won ? '+' + (parseFloat(b.fairOdds)-1).toFixed(2) + 'u' : '-1.00u');
      var pnlCol = b.won ? 'var(--green)' : 'var(--red)';
      html += '<div class="match-bottom">';
      html += '<span class="match-bet">' + esc(b.name) + '</span>';
      html += '<span class="match-odds">@' + b.fairOdds + '</span>';
      html += '<span class="match-conf" style="color:' + scoreColor(b.score) + '">' + b.score + '/100</span>';
      if (pnl) html += '<span style="font-family:\'Bebas Neue\',cursive;font-size:14px;color:' + pnlCol + '">' + pnl + '</span>';
      html += '</div>';
    }

    html += '</div>';
  });
  html += '</div>';

  results.innerHTML = html;
}
/* ── SVG ROI Chart ── */
function renderROIChart(data) {
  if (data.length < 2) return '';
  var W = 380, H = 100;
  var min = Math.min.apply(null, data.concat([0]));
  var max = Math.max.apply(null, data.concat([0]));
  var range = Math.max(max - min, 0.01);
  var stepX = W / (data.length - 1);
  var toY = function(v) { return H - ((v - min) / range * H * 0.85) - H * 0.075; };
  var zero = toY(0);
  var pts = data.map(function(v, i) { return (i * stepX).toFixed(1) + ',' + toY(v).toFixed(1); }).join(' ');
  var fillPts = '0,' + zero + ' ' + pts + ' ' + ((data.length-1)*stepX).toFixed(1) + ',' + zero;
  var lastV = data[data.length-1];
  var lineCol = lastV >= 0 ? 'var(--green)' : 'var(--red)';
  var fillCol = lastV >= 0 ? 'rgba(0,229,184,0.12)' : 'rgba(255,71,87,0.08)';

  var svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">';
  svg += '<line x1="0" y1="' + zero.toFixed(1) + '" x2="' + W + '" y2="' + zero.toFixed(1) + '" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4,4"/>';
  svg += '<polygon points="' + fillPts + '" fill="' + fillCol + '"/>';
  svg += '<polyline points="' + pts + '" fill="none" stroke="' + lineCol + '" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
  var lx = ((data.length-1)*stepX).toFixed(1);
  var ly = toY(lastV).toFixed(1);
  svg += '<circle cx="' + lx + '" cy="' + ly + '" r="5" fill="' + lineCol + '"/>';
  svg += '<text x="' + (parseFloat(lx) - (lastV >= 0 ? -10 : 60)) + '" y="' + (parseFloat(ly)+4) + '" font-size="13" fill="' + lineCol + '" font-weight="700" font-family="Bebas Neue,cursive">' + (lastV>=0?'+':'') + lastV.toFixed(2) + 'u</text>';
  svg += '</svg>';
  return svg;
}
/* ── Helpers ── */
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function formatDate(iso) {
  try {
    var d = new Date(iso);
    return d.toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit' });
  } catch(e) { return ''; }
}
function scoreColor(s) {
  return s>=75?'var(--green)':s>=60?'var(--gold)':s>=45?'var(--orange)':'var(--red)';
}
function showToast(msg) {
  var t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1c1c2e;border:1px solid #2a2a3e;color:#f0f0ff;padding:10px 16px;border-radius:8px;font-size:13px;z-index:1000;';
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 3000);
}

initDates();
</script>
